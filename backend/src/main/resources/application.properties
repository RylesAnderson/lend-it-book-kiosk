# Server
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:lenditbookkiosk;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console at http://localhost:8080/h2-console (useful for inspecting data during dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Seed data (data.sql runs after schema is created)
spring.sql.init.mode=always

# CORS allowed origins (comma separated). Override in production.
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
